<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="100%" style="stop-color:#FF8C00" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background (transparent for versatility) -->

  <!-- Icon: stylized "D" with circuit/tech elements -->
  <g filter="url(#glow)">
    <!-- Outer hexagon shape -->
    <polygon points="40,8 58,18 58,62 40,72 22,62 22,18" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
    <!-- Inner D shape -->
    <path d="M32,25 L32,55 L42,55 C50,55 55,50 55,40 C55,30 50,25 42,25 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
    <path d="M36,29 L36,51 L41,51 C47,51 51,47 51,40 C51,33 47,29 41,29 Z" fill="url(#goldGrad)" opacity="0.85"/>
    <!-- Circuit dots -->
    <circle cx="22" cy="40" r="2.5" fill="#FFD700"/>
    <circle cx="58" cy="40" r="2.5" fill="#FFD700"/>
    <circle cx="40" cy="8" r="2" fill="#FFA500"/>
    <circle cx="40" cy="72" r="2" fill="#FFA500"/>
    <!-- Small tick marks (circuit feel) -->
    <line x1="13" y1="40" x2="20" y2="40" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="60" y1="40" x2="67" y2="40" stroke="#FFD700" stroke-width="1.5"/>
  </g>

  <!-- Wordmark -->
  <text x="78" y="36" font-family="'Trebuchet MS', sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="url(#goldGrad)">DEMITECH</text>
  <!-- Subtitle -->
  <text x="79" y="54" font-family="'Trebuchet MS', sans-serif" font-size="10" font-weight="400" letter-spacing="4" fill="#aaaaaa">WEB SERVICES</text>
  <!-- Underline accent -->
  <line x1="79" y1="58" x2="260" y2="58" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
</svg>
