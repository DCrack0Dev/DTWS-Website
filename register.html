<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register – DemiTech Web Services</title>
<link rel="stylesheet" href="style.css"/>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="/firebase-config.js"></script>
<style>
    /* Mobile Responsive Fixes */
    @media (max-width: 768px) {
      .auth-container {
        padding: 2rem;
        margin: 1rem;
        width: calc(100% - 2rem);
      }
      .section-title {
        font-size: 2rem;
      }
      .btn-full {
        padding: 12px;
      }
    }
  </style>
</head>
<body class="auth-page">

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <img src="demitech-logo.svg" alt="DemiTech Web Services Logo"/>
    </a>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="pricing.html">Pricing</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html" class="active">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- REGISTER FORM -->
<section class="auth-section">
  <div class="auth-container fade-up d1">
    <span class="section-tag">// Join Us</span>
    <h1 class="section-title">Create <span class="gold">Account</span></h1>
    <div class="divider"></div>
    
    <form id="registerForm" class="auth-form">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" name="name" placeholder="e.g. Thabo Nkosi" required/>
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" placeholder="••••••••" required minlength="8"/>
      </div>
      <div class="form-group">
        <label for="admin-key">Admin Key (Optional)</label>
        <input type="password" id="admin-key" name="admin_key" placeholder="For admins only"/>
      </div>
      <button type="submit" class="btn btn-gold btn-full">🚀 Join DemiTech</button>
      <p class="auth-toggle">Already have an account? <a href="login.html">Login here</a></p>
    </form>
    
    <div id="reg-error" class="auth-error" style="display:none;">Registration failed. Please try again.</div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const registerForm = document.getElementById('registerForm');
    const errorMsg = document.getElementById('reg-error');

    // Use global Firebase from firebase-config.js
    if (typeof firebase === 'undefined') {
        console.error("Firebase SDK failed to load or firebase-config.js is missing.");
        return;
    }

    registerForm.onsubmit = async (e) => {
        e.preventDefault();
        const name = registerForm.name.value;
        const email = registerForm.email.value;
        const password = registerForm.password.value;
        const adminKey = registerForm.admin_key.value;
        
        try {
            // Verify initialization
            if (!window.auth) throw new Error("Firebase initialization failed. Check your configuration.");

            // Create user account using Firebase Auth
            const userCredential = await window.auth.createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;
            
            // Update profile (display name)
            await user.updateProfile({ displayName: name });
            
            // Check if secret key matches for admin elevation
            // Secret is: demitech_admin_2026
            const role = adminKey === 'demitech_admin_2026' ? 'admin' : 'client';
            
            // Create database profile in Firestore
            await window.db.collection('profiles').doc(user.uid).set({ 
                nickname: name, 
                email: email,
                role: role, 
                isActive: true,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            if (role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        } catch (error) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = error.message || "Registration failed. Please try again.";
            console.error('Registration error:', error);
        }
    };
});
</script>

</body>
</html>
