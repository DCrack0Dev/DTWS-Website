<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login – DemiTech Web Services</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
<script src="appwrite-config.js" defer></script>
</head>
<body class="auth-page">

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <img src="demitech-logo.svg" alt="DemiTech Web Services Logo"/>
    </a>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="pricing.html">Pricing</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html" class="active">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- LOGIN FORM -->
<section class="auth-section">
  <div class="auth-container fade-up d1">
    <span class="section-tag">// Welcome Back</span>
    <h1 class="section-title">Client <span class="gold">Portal</span></h1>
    <div class="divider"></div>
    
    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-gold btn-full">🚀 Secure Login</button>
      <p class="auth-toggle">Don't have an account? <a href="register.html">Create one</a></p>
    </form>
    
    <div id="login-error" class="auth-error" style="display:none;">Invalid email or password. Please try again.</div>
  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('login-error');

    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        const email = loginForm.email.value;
        const password = loginForm.password.value;
        
        try {
            await Auth.login(email, password);
            const user = await Auth.getUser();
            if (user.role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        } catch (error) {
            errorMsg.style.display = 'block';
            console.error('Login error:', error);
        }
    };
});
</script>

</body>
</html>
